version: '3.8'

services:
  oxrecon:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: oxrecon
    ports:
      - "8080:8080"
    volumes:
      - ./reports:/root/reports
      - ./configs:/etc/oxrecon
    environment:
      - oxrecon_CONFIG=/etc/oxrecon/config.yaml
      - SHODAN_API_KEY=${SHODAN_API_KEY:-}
      - CENSYS_API_ID=${CENSYS_API_ID:-}
      - CENSYS_API_SECRET=${CENSYS_API_SECRET:-}
    command: ["api"]
    restart: unless-stopped

  oxrecon-dev:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: oxrecon-dev
    ports:
      - "8081:8080"
    volumes:
      - .:/app
    entrypoint: ["go", "run", "main.go"]
    profiles:
      - dev

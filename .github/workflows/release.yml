name: Release & Publish to GitHub Packages

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v1.0.0)'
        required: true

permissions:
  contents: write
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - name: Run tests
        run: go test -v -race -coverprofile=coverage.out ./...
      - name: Coverage report
        run: go tool cover -func=coverage.out

  build-binaries:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
        exclude:
          - goos: windows
            goarch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          EXT=""
          if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi
          go build -ldflags="-s -w" -o oxrecon-${{ matrix.goos }}-${{ matrix.goarch }}${EXT} main.go
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: oxrecon-${{ matrix.goos }}-${{ matrix.goarch }}
          path: oxrecon-*

  docker-build-push:
    name: Docker → ghcr.io
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish-go-module:
    name: Publish Go Module
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - name: Tag Go module
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Publish to GitHub Packages
        env:
          GOPROXY: proxy.golang.org,direct
          GOPRIVATE: github.com/TEGAR-SRC/*
        run: |
          echo "Go module ready: go install github.com/TEGAR-SRC/oxrecon@latest"

  create-release:
    name: Create GitHub Release
    needs: [build-binaries, docker-build-push, publish-go-module]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Package binaries
        run: |
          cd dist
          for dir in */; do
            if ls "$dir"/* 2>/dev/null; then
              name=$(basename "$dir")
              cd "$dir"
              zip -j "../${name}.zip" ./*
              cd ..
            fi
          done
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
          generate_release_notes: true
          draft: false
          prerelease: false

  notify:
    name: Summary
    needs: [create-release, docker-build-push]
    runs-on: ubuntu-latest
    steps:
      - name: Print release info
        run: |
          echo "=== Release Published ==="
          echo "Docker Image: ghcr.io/${{ github.repository }}:latest"
          echo "GitHub Release: ${{ github.server_url }}/${{ github.repository }}/releases"
          echo ""
          echo "Install via Go:"
          echo "  go install github.com/TEGAR-SRC/oxrecon@latest"
          echo ""
          echo "Install via Docker:"
          echo "  docker pull ghcr.io/${{ github.repository }}:latest"
          echo "  docker run --rm ghcr.io/${{ github.repository }}:latest version"
